<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger King - Burger Brand Space</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-text: #1c1c1e;
            --ios-sub: #8e8e93;
            --ios-orange: #e67e22;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--ios-card);
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--ios-orange);
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 16px;
            color: var(--ios-sub);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* 💡 이미지 컨테이너 및 둥글기 */
        .menu-image-container {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
            background: #fafafa;
            border: 1px solid #e5e5ea;
        }

        .menu-image {
            width: 100%;
            height: auto;
            display: block;
        }

        hr {
            border: none;
            border-top: 0.5px solid #e5e5ea;
            margin: 20px 0;
        }

        h3 {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }

        p {
            font-size: 15px;
            line-height: 1.6;
            color: #3a3a3c;
            margin: 0 0 16px 0;
        }

        .back-btn {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 28px;
            background-color: var(--ios-orange);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border-radius: 14px;
            transition: transform 0.2s, opacity 0.2s;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .back-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👑 버거킹 (Burger King)</h1>
        <div class="tagline">"리얼 직화 구이 패티의 진정한 강자"</div>
        
        <!-- 💡 고화질 대표 메뉴 이미지 추가 -->
        <div class="menu-image-container">
            <img src="https://cdn.prod.website-files.com/631b4b4e277091ef01450237/65947cd2a2c28c35b5ca6fb1_Whopper%20w%20Cheese.png" class="menu-image" alt="Burger King Whopper">
        </div>

        <hr>

        <h3>🔥 Flame-Grilled (직화구이 방식)</h3>
        <p>패티를 고온의 철판 대신 불길이 직접 와닿는 그릴 직화 방식으로 조리하여, 한 입 베어 물자마자 느껴지는 정통 숯불 훈연 향이 입맛을 압도합니다.</p>
        
        <h3>🍔 와퍼(Whopper)의 강렬한 포만감</h3>
        <p>신선한 토마토와 아삭한 양파, 묵직하고 거대한 패티가 어우러진 시그니처 '와퍼' 라인업을 통해 단순한 패스트푸드를 넘어선 묵직한 프리미엄 수제버거급 만족감을 선사합니다.</p>

        <!-- 💡 메인 주소 buggermain.html로 복귀 -->
        <a href="buggermain.html" class="back-btn">메인 대시보드로 돌아가기</a>
    </div>

</body>
</html>
